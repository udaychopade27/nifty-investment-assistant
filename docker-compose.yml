version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      TZ: Asia/Kolkata
      POSTGRES_DB: etf_assistant
      POSTGRES_USER: etf_user
      POSTGRES_PASSWORD: etf_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etf_user -d etf_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
