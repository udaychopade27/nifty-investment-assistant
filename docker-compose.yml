version: "3.9"

services:
  app:
    build: .
    container_name: nifty_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./app:/app/app   # 🔥 HOT RELOAD MAGIC
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:14
    container_name: nifty_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nifty_invest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
